# ============================================================
# ISO 20022 Payment Routing Engine - Application Configuration
# ============================================================
# NOTE: Sensitive values (DB credentials, API keys) are set via
# environment variables on the deployment platform (Render).
# Environment variables take precedence over this file in Spring Boot.
# ============================================================

# Server
server.port=${PORT:8080}

# ============================================================
# PostgreSQL Database
# Render provides DATABASE_URL. Spring Boot requires JDBC format.
# Set SPRING_DATASOURCE_URL on Render as:
#   jdbc:postgresql://<host>:<port>/<dbname>
# Set SPRING_DATASOURCE_USERNAME and SPRING_DATASOURCE_PASSWORD as well.
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/payment_routing}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ============================================================
# JPA / Hibernate
# IMPORTANT: 'update' creates missing tables without dropping data.
# Never use 'create-drop' in production.
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================================
# Tier A: Frankfurter API (daily ECB reference rates, no auth)
# Source: https://api.frankfurter.dev/v2
# ============================================================
app.fx.frankfurter.url=https://api.frankfurter.dev/v2
app.fx.frankfurter.enabled=true
app.fx.frankfurter.timeout-ms=6000

# Legacy compat alias used by FxRateService
app.fx.api.url=https://api.frankfurter.dev/v2
app.fx.api.enabled=true
app.fx.api.timeout-ms=5000

# ============================================================
# Tier B: Finnhub.io WebSocket (live forex ticks)
# Set APP_FX_FINNHUB_API_KEY on Render. If missing, gracefully
# degrades to Tier C (ExchangeRate-API).
# ============================================================
app.fx.finnhub.api-key=${APP_FX_FINNHUB_API_KEY:REPLACE_ME}
app.fx.finnhub.ws-url=wss://ws.finnhub.io
# Disabled by default: Render free tier kills persistent outbound WebSocket connections (status 1006).
# Set APP_FX_FINNHUB_ENABLED=true in Render env vars only if on a paid plan or using a proxy.
# FX pricing gracefully degrades to Tier C (ExchangeRate-API) and Tier A (Frankfurter) automatically.
app.fx.finnhub.enabled=${APP_FX_FINNHUB_ENABLED:false}
app.fx.finnhub.symbols=OANDA:EUR_USD,OANDA:USD_MXN,OANDA:GBP_USD
app.fx.finnhub.reconnect-delay-ms=5000

# ============================================================
# Tier C: ExchangeRate-API (exotic pairs, free, no auth)
# Source: https://open.er-api.com
# ============================================================
app.fx.exchangerate.url=https://open.er-api.com/v6/latest
app.fx.exchangerate.enabled=true
app.fx.exchangerate.poll-interval-ms=300000

# ============================================================
# Stellar Testnet (Horizon REST API — no auth, public testnet)
# ============================================================
app.stellar.horizon-url=https://horizon-testnet.stellar.org
app.stellar.enabled=true
app.stellar.timeout-ms=8000
app.stellar.usd-issuer=GBBD47IF6LWK7P7MDEVSCWR7DPUWV3NY3DTQEVFL4NAT4AQH3ZLLFLA5
app.stellar.eur-issuer=GBBD47IF6LWK7P7MDEVSCWR7DPUWV3NY3DTQEVFL4NAT4AQH3ZLLFLA5
app.stellar.min-path-amount=10

# ============================================================
# Routing Engine Configuration
# ============================================================
app.routing.max-hops=6
app.routing.default-transfer-surcharge=0.002
app.routing.stellar-base-fee-stroops=100

# ============================================================
# Logging
# ============================================================
logging.level.com.routing=DEBUG
logging.level.com.routing.service.fx.FinnhubWebSocketService=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.messaging=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
